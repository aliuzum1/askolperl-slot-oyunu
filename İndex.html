<!DOCTYPE html>.
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askolperl | 3D Casino Slot</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .machine { display: flex; gap: 5px; perspective: 1000px; margin-bottom: 20px; }
        .slot { width: 45px; height: 70px; background: #16213e; border: 2px solid #3498db; border-radius: 10px; overflow: hidden; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .reel { position: absolute; width: 100%; top: 0; }
        .digit { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px #f1c40f; }
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-3d { padding: 15px 40px; background: #e74c3c; border: none; border-radius: 15px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 0 #c0392b; transition: all 0.1s; }
        .btn-3d:active { transform: translateY(5px); box-shadow: 0 5px 0 #c0392b; }
        #result { margin-top: 15px; font-size: 28px; font-weight: bold; height: 40px; }
        .info-box { background: #16213e; color: #bdc3c7; padding: 15px; border-radius: 15px; margin-top: 20px; width: 90%; max-width: 400px; border: 1px solid #3498db; text-align: left; }
    </style>
</head>
<body>
    <div class="machine">
        <div class="slot"><div class="reel" id="r0"></div></div>
        <div class="slot"><div class="reel" id="r1"></div></div>
        <div class="slot"><div class="reel" id="r2"></div></div>
        <div class="slot"><div class="reel" id="r3"></div></div>
        <div class="slot"><div class="reel" id="r4"></div></div>
        <div class="slot"><div class="reel" id="r5"></div></div>
    </div>
    <div class="controls">
        <button class="btn-3d" onclick="startGame()">BAŞLAT</button>
    </div>
    <div id="result"></div>
    <div class="info-box">
        <h3>Nasıl Oynanır?</h3>
        <p>1. <b>Başlat:</b> Butona bas ve hızlı dönüşün keyfini çıkar.</p>
        <p>2. <b>Kazanç:</b> 3 aynı rakam yan yana gelirse kazanırsın!</p>
    </div>

    <script>
        const reels = document.querySelectorAll('.reel');
        reels.forEach(reel => {
            for(let i=0; i<30; i++) { reel.innerHTML += `<div class="digit">${i % 10}</div>`; }
        });

        function startGame() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Dönüyor...";
            resultDiv.style.color = "#fff";
            
            let finalNumbers = [];
            // Süreyi 2 saniyeye indirdik (5 kat hızlandı)
            const totalDuration = 2; 

            reels.forEach((reel, index) => {
                // Kademeli duruşu daha sıkı tutuyoruz (0.1s aralıkla)
                const duration = totalDuration - ((5 - index) * 0.1); 
                
                reel.style.transition = `transform ${duration}s cubic-bezier(0.2, 0, 0.8, 1)`;
                const randomNum = Math.floor(Math.random() * 10);
                finalNumbers.push(randomNum); 
                
                const targetPos = (10 + randomNum) * 70;
                reel.style.transform = `translateY(-${targetPos}px)`;
            });

            setTimeout(() => {
                checkWin(finalNumbers);
            }, (totalDuration * 1000) + 100);
        }

        function checkWin(nums) {
            const resultDiv = document.getElementById('result');
            let counts = {};
            nums.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const hasWin = Object.values(counts).some(c => c >= 3);
            if (hasWin) {
                resultDiv.innerText = "TEBRİKLER! BAŞARILI!";
                resultDiv.style.color = "#2ecc71";
            } else {
                resultDiv.innerText = "Kaybettin, tekrar dene!";
                resultDiv.style.color = "#e74c3c";
            }
        }
    </script>
</body>
</html>
